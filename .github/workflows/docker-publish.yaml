name: Build and Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  determine_services:
    name: Determine changed services
    runs-on: ubuntu-latest
    outputs:
      changed_services: ${{ steps.changed_services.outputs.json }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Get list of changed files
        id: git_changes
        run: echo "changed_files=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Determine changed services
        id: changed_services
        run: |
          services=()
          for path in ${{ env.changed_files }}; do
            if [[ $path == Microservices/* ]]; then
              service=$(echo $path | cut -d'/' -f2)
              services+=($service)
            fi
          done

          # Remove duplicates
          unique_services=($(echo "${services[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))

          # Convert to JSON for use in matrix job
          echo "json=[\"${unique_services[@]}\"]"
          echo "json=$(echo $json | jq -c)" >> $GITHUB_ENV
          echo "json=$json" >> $GITHUB_ENV

  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: determine_services
    strategy:
      matrix:
        service: ${{ fromJson(needs.determine_services.outputs.changed_services) }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 with Corretto
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permissions for gradlew
        run: chmod +x Microservices/${{ matrix.service }}/gradlew

      - name: Build with Gradle
        working-directory: Microservices/${{ matrix.service }}
        run: ./gradlew clean build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: Microservices/${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.service }}-latest